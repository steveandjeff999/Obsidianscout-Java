<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Documentation</title>
    <link rel="stylesheet" href="/css/app.css" />
    <style>
        /* Custom styles for documentation view */
        .docs-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin-top: 20px;
            align-items: start;
        }
        .docs-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: sticky;
            top: 20px;
        }
        .docs-menu-item {
            padding: 14px 18px;
            background: var(--card-bg, rgba(255, 255, 255, 0.05));
            border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1));
            border-radius: 8px;
            color: var(--text-color, #f3f4f6);
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 500;
            outline: none;
        }
        .docs-menu-item:hover {
            background: var(--card-hover-bg, rgba(255, 255, 255, 0.1));
            transform: translateX(4px);
        }
        .docs-menu-item.active {
            background: var(--primary, #6200ee);
            color: #fff;
            border-color: var(--primary, #6200ee);
            transform: translateX(6px);
            box-shadow: 0 4px 12px rgba(98, 0, 238, 0.3);
        }
        .docs-content {
            min-height: 550px;
            padding: 32px;
        }
        /* Markdown rendering styles */
        .markdown-body {
            line-height: 1.62;
            font-size: 15.5px;
            color: var(--text-color, #f3f4f6);
        }
        .markdown-body h1 {
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.15));
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-light, #a78bfa);
        }
        .markdown-body h2 {
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.1));
            padding-bottom: 8px;
            margin-top: 36px;
            margin-bottom: 16px;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--secondary-light, #38bdf8);
        }
        .markdown-body h3 {
            margin-top: 28px;
            margin-bottom: 12px;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .markdown-body p, .markdown-body ul, .markdown-body ol {
            margin-bottom: 20px;
        }
        .markdown-body ul, .markdown-body ol {
            padding-left: 24px;
        }
        .markdown-body li {
            margin-bottom: 8px;
        }
        .markdown-body code {
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
            background: rgba(255, 255, 255, 0.08);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--primary-light, #a78bfa);
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.25);
            padding: 18px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 24px;
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            font-size: 0.9em;
            color: #f3f4f6;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--primary, #6200ee);
            padding: 12px 20px;
            margin: 0 0 24px 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            padding: 10px 14px;
            text-align: left;
        }
        .markdown-body th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }
        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--border-color, rgba(255,255,255,0.1));
            margin: 32px 0;
        }
        
        /* Alert banners in Markdown rendering (resembling GitHub alerts) */
        .markdown-body blockquote p:first-child {
            margin-top: 0;
        }
        .markdown-body blockquote p:last-child {
            margin-bottom: 0;
        }
        
        @media (max-width: 900px) {
            .docs-container {
                grid-template-columns: 1fr;
            }
            .docs-menu {
                position: static;
            }
        }
    </style>
</head>
<body data-page="docs">
    <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <!-- Sidebar will be replaced by Ktor with base.html -->
        </aside>

        <main class="main-content">
            <div class="card">
                <h1 data-i18n="docs.title">Documentation</h1>
                <p class="notice" data-i18n="docs.notice">Learn how to configure, run, and use the ObsidianScout scouting system.</p>
            </div>

            <div class="docs-container">
                <nav class="docs-menu" id="docs-menu">
                    <div style="padding: 10px; text-align: center; color: var(--text-muted, #777);" data-i18n="docs.loading">Loading articles...</div>
                </nav>
                <div class="card docs-content">
                    <article class="markdown-body" id="docs-viewport">
                        <h2 style="border: none;" data-i18n="docs.select_article">Select an article from the menu to start reading.</h2>
                    </article>
                </div>
            </div>
        </main>
    </div>

    <!-- Include marked.js from CDN to parse markdown on the client side -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="/js/common.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            Obsidianscout.initTheme();
            const me = await Obsidianscout.requireAuth();
            if (!me) {
                return;
            }
            Obsidianscout.setUserBadge(me);
            Obsidianscout.setActiveNav();
            Obsidianscout.adjustNavForRole(me);
            Obsidianscout.wireLogout();
            Obsidianscout.wireThemeToggle();

            const menuContainer = document.getElementById("docs-menu");
            const viewport = document.getElementById("docs-viewport");
            let activeFilename = null;

            const getLang = () => localStorage.getItem('obsidianscout:lang') || 'en';

            function loadDocsList(lang) {
                menuContainer.innerHTML = `<div style="padding: 10px; text-align: center; color: var(--text-muted, #777);">${translate('docs.loading', 'Loading articles...')}</div>`;
                
                fetch(`/api/docs?lang=${lang}`)
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to load documents list");
                        return res.json();
                    })
                    .then(files => {
                        if (files.length === 0) {
                            menuContainer.innerHTML = `<div style="padding: 10px; color: var(--text-muted);">${translate('docs.empty', 'No documentation files found.')}</div>`;
                            return;
                        }
                        menuContainer.innerHTML = "";
                        files.forEach((file, index) => {
                            const btn = document.createElement("button");
                            btn.className = "docs-menu-item";
                            btn.textContent = file.title;
                            btn.dataset.filename = file.filename;
                            btn.addEventListener("click", () => {
                                activeFilename = file.filename;
                                loadArticle(file.filename, btn, lang);
                            });
                            menuContainer.appendChild(btn);

                            // Load active or default article
                            if (activeFilename === file.filename || (!activeFilename && index === 0)) {
                                activeFilename = file.filename;
                                loadArticle(file.filename, btn, lang);
                            }
                        });
                    })
                    .catch(err => {
                        console.error(err);
                        menuContainer.innerHTML = `<div style="padding: 10px; color: var(--danger);">${translate('docs.error_loading', 'Failed to load menu.')}</div>`;
                    });
            }

            function loadArticle(filename, buttonEl, lang) {
                // Update active states
                document.querySelectorAll(".docs-menu-item").forEach(el => el.classList.remove("active"));
                if (buttonEl) buttonEl.classList.add("active");

                viewport.innerHTML = `<h2>${translate('docs.loading_article', 'Loading article...')}</h2>`;

                fetch(`/api/docs/${filename}?lang=${lang}`)
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to load article content");
                        return res.json();
                    })
                    .then(data => {
                        if (window.marked && typeof marked.parse === "function") {
                            viewport.innerHTML = marked.parse(data.content);
                        } else {
                            viewport.innerHTML = `<pre>${data.content}</pre>`;
                        }
                    })
                    .catch(err => {
                        viewport.innerHTML = `<h2 style="color: var(--danger);">${translate('docs.error_loading', 'Error loading documentation')}</h2><p>${err.message}</p>`;
                    });
            }

            function translate(key, fallback) {
                if (window.Obsidianscout && typeof window.Obsidianscout.t === 'function') {
                    return window.Obsidianscout.t(key, fallback);
                }
                return fallback;
            }

            // Listen for language changes from sidebar dropdown
            window.addEventListener('obsidianscout:languagechange', (e) => {
                const lang = e.detail.lang || 'en';
                // Reload list (keeps active article selected but translates it)
                loadDocsList(lang);
            });

            // Initial load
            const currentLang = getLang();
            loadDocsList(currentLang);
        });
    </script>
</body>
</html>
