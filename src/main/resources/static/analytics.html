<!doctype html>

<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>ObsidianScout | Analytics</title>

    <link rel="stylesheet" href="/css/app.css" />

    <link rel="manifest" href="/manifest.json" />
</head>

<body data-page="analytics">
        <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>

    <div class="orb orb-1"></div>

    <div class="orb orb-3"></div>



    <div class="app-shell">

        <aside class="sidebar">

            <div class="sidebar-brand">ObsidianScout</div>

                        <nav class="sidebar-nav">
                <a class="sidebar-link" data-page="dashboard" href="/dashboard">Dashboard</a>
                <a class="sidebar-link" data-page="scout" href="/scout">Scout</a>
                <a class="sidebar-link" data-page="pit-scout" href="/pit-scout">Pit Scout</a>
                <a class="sidebar-link" data-page="qual-scout" href="/qual-scout">Qual Scout</a>
                <a class="sidebar-link" data-page="qual-data" href="/qual-data">Qual Data</a>
                <a class="sidebar-link" data-page="pit-data" href="/pit-data">Pit Data</a>
                <a class="sidebar-link" data-page="analytics" href="/analytics">Analytics</a>
                <a class="sidebar-link" data-page="graphs" href="/graphs">Graphs</a>
                <a class="sidebar-link" data-page="events" href="/events">Events</a>
                <a class="sidebar-link" data-page="teams" href="/teams">Teams</a>
                <a class="sidebar-link" data-page="matches" href="/matches">Matches</a>
                <a class="sidebar-link" data-page="predictor" href="/predictor">Predictor</a>
                <a class="sidebar-link" data-page="alliances" href="/alliances" id="nav-alliances">Alliances</a>
                <a class="sidebar-link" data-page="alliance-selection" href="/alliance-selection">Alliance Selection</a>
                <a class="sidebar-link" data-page="users" href="/users">Users</a>
                <a class="sidebar-link" data-page="settings" href="/config">Settings</a>
            </nav>

            <div class="sidebar-footer">

                <span id="nav-user" class="badge"></span>

                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>

                <button class="btn ghost" data-action="logout" type="button">Sign out</button>

            </div>

        </aside>



        <main class="main-content">

            <div class="card">

                <h1 data-i18n="analytics.title">Analytics from config</h1>

                <p class="notice" data-i18n="analytics.notice">Widgets are generated from the analytics section of the config JSON.</p>

            </div>

            <div id="analytics-grid" class="metrics mt-20"></div>

        </main>

    </div>



    <script defer src="/js/common.js"></script>

    <script defer src="/js/analytics.js"></script>

</body>

</html>
