<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Qualitative Rankings</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="manifest" href="/manifest.json" />
</head>
<body data-page="qual-rankings">
    <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-2"></div>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">ObsidianScout</div>
            <nav class="sidebar-nav">
                <!-- Injected by base.html / Ktor -->
            </nav>
            <div class="sidebar-footer">
                <span id="nav-user" class="badge"></span>
                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>
                <button class="btn ghost" data-action="logout" type="button">Sign out</button>
            </div>
        </aside>
        <main class="main-content">
            <!-- Filter by Robot Role section -->
            <div id="role-filter-card" class="card soft hidden mb-20">
                <div class="row align-center gap-8 mb-12">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted);"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    <h3 style="margin: 0; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);">Filter by Robot Role</h3>
                </div>
                <div class="row wrap gap-8 align-center">
                    <button class="btn-role-filter active" data-role="all" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        <span>All Teams</span>
                    </button>
                    <button class="btn-role-filter" data-role="Cycling" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                        <span>Cycling</span>
                    </button>
                    <button class="btn-role-filter" data-role="Stealing" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M6 14v-1.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2V18a6 6 0 0 0 6 6h4a8 8 0 0 0 8-8v-2a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2"></path></svg>
                        <span>Stealing</span>
                    </button>
                    <button class="btn-role-filter" data-role="Scoring" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                        <span>Scoring</span>
                    </button>
                    <button class="btn-role-filter" data-role="Feeding" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v14M19 9l-7-7-7 7M20 22H4"></path></svg>
                        <span>Feeding</span>
                    </button>
                    <button class="btn-role-filter" data-role="Defending" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        <span>Defending</span>
                    </button>
                    <button class="btn-role-filter" data-role="N/C" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
                        <span>N/C</span>
                    </button>
                </div>
                <p class="notice" style="margin-top: 8px; margin-bottom: 0;">Select one or more roles to filter teams. "All Teams" shows everyone.</p>
            </div>

            <div class="card">
                <div class="row align-center justify-between wrap gap-12 mb-18">
                    <div class="row align-center gap-8">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        <h1 style="margin: 0;" data-i18n="qual_rankings.title">Qualitative Rankings</h1>
                        <span id="rankings-team-count-badge" class="badge" style="font-weight: 700;">0 teams</span>
                    </div>
                </div>
                <p class="notice" data-i18n="qual_rankings.notice">Rank teams based on qualitative metrics computed from scouting entries.</p>
                
                <div class="row gap-12 wrap align-center" style="width: 100%; margin-bottom: 20px;">
                    <div class="field" style="min-width: 240px; margin-top: 0;">
                        <label for="metric-select" style="margin-bottom: 4px;" data-i18n="qual_rankings.metric">Qualitative Metric</label>
                        <select id="metric-select" class="select-wide">
                            <!-- Populated dynamically from qual config -->
                        </select>
                    </div>
                    <div class="field" style="min-width: 160px; margin-top: 0;">
                        <label for="aggregate-select" style="margin-bottom: 4px;" data-i18n="qual-data.aggregation">Aggregation</label>
                        <select id="aggregate-select" class="select-wide">
                            <option value="avg" data-i18n="qual-data.average" selected>Average</option>
                            <option value="median" data-i18n="qual-data.median">Median</option>
                            <option value="latest" data-i18n="qual-data.latest">Latest</option>
                            <option value="max" data-i18n="settings.max">Max</option>
                            <option value="min" data-i18n="settings.min">Min</option>
                        </select>
                    </div>
                    <div style="flex-grow: 1;"></div>
                    <div class="field" style="min-width: 240px; margin-top: 0;">
                        <label for="event-filter" style="margin-bottom: 4px;" data-i18n="matches.view_event">View Event</label>
                        <select id="event-filter" class="select-wide"></select>
                    </div>
                </div>

                <div class="table-scroll">
                    <table class="table" id="qual-rankings-table">
                        <thead>
                            <tr id="table-headers">
                                <th style="width: 60px;">Rank</th>
                                <th style="width: 120px;">TEAM</th>
                                <!-- Dynamic headers will be inserted here -->
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/qual-rankings.js"></script>
</body>
</html>
