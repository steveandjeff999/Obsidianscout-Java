<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Login</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="login">
        <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="shell login-shell">
        <section class="hero login-hero">
            <div>
                <div class="brand">ObsidianScout</div>
                <h1 data-i18n="index.tagline">Scout smarter, move faster.</h1>
                <p>Log in with your team credentials to start capturing match data and live analytics.</p>
                <div class="card soft">
                    <strong>Multi-team ready.</strong> Each team gets its own isolated data, settings, and scouting config.
                </div>
            </div>
            <div class="card auth-card">
                <div class="tab-row" id="auth-tabs">
                    <button class="tab active" data-tab="login" type="button" data-i18n="index.sign_in_tab">Sign in</button>
                    <button class="tab" data-tab="register" type="button" data-i18n="index.create_account_tab">Create account</button>
                </div>

                <div id="login-panel">
                    <form id="login-form" class="form-grid">
                        <div class="field">
                            <label for="username">Username</label>
                            <input id="username" name="username" type="text" required />
                        </div>
                        <div class="field">
                            <label for="teamNumber">Team Number</label>
                            <input id="teamNumber" name="teamNumber" type="number" required />
                        </div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input id="password" name="password" type="password" required />
                        </div>
                        <button id="login-submit" class="btn" type="submit" data-i18n="index.login_submit">Sign in</button>
                    </form>
                </div>

                <div id="register-panel" class="hidden" hidden>
                    <form id="register-form" class="form-grid">
                        <div class="field">
                            <label for="reg-username">Username</label>
                            <input id="reg-username" type="text" required />
                        </div>
                        <div class="field">
                            <label for="reg-team">Team Number</label>
                            <input id="reg-team" type="number" required min="1" />
                        </div>
                        <div class="field">
                            <label for="reg-password">Password</label>
                            <input id="reg-password" type="password" required minlength="4" />
                        </div>
                        <div class="field">
                            <label for="reg-confirm">Confirm Password</label>
                            <input id="reg-confirm" type="password" required minlength="4" />
                        </div>
                        <div class="field">
                            <label for="reg-role">Role</label>
                            <select id="reg-role" required>
                                <option value="SCOUT">Scout</option>
                                <option value="ANALYTICS">Analytics</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <button id="register-submit" class="btn dark" type="submit" data-i18n="index.register_submit">Create account</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/common.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
