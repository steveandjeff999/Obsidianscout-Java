<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Matches</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="matches">
    <div class="orb orb-1"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">ObsidianScout</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link" data-page="dashboard" href="/dashboard">Dashboard</a>
                <a class="sidebar-link" data-page="scout" href="/scout">Scout</a>
                <a class="sidebar-link" data-page="pit-scout" href="/pit-scout">Pit Scout</a>
                <a class="sidebar-link" data-page="pit-data" href="/pit-data">Pit Data</a>
                <a class="sidebar-link" data-page="analytics" href="/analytics">Analytics</a>
                <a class="sidebar-link" data-page="graphs" href="/graphs">Graphs</a>
                <a class="sidebar-link" data-page="events" href="/events">Events</a>
                <a class="sidebar-link" data-page="teams" href="/teams">Teams</a>
                <a class="sidebar-link" data-page="matches" href="/matches">Matches</a>
                <a class="sidebar-link" data-page="users" href="/users">Users</a>
                <a class="sidebar-link" data-page="settings" href="/config">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <span id="nav-user" class="badge"></span>
                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>
                <button class="btn ghost" data-action="logout" type="button">Sign out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="card">
                <h1>Matches</h1>
                <p class="notice">Sync matches for the selected event and use them on the scouting form.</p>
                <div class="row gap-12 wrap align-center" style="width: 100%;">
                    <button class="btn" id="sync-event" type="button">Sync matches</button>
                    <button class="btn secondary hidden" id="add-match-btn" type="button">Add Match Manually</button>
                    <div style="flex-grow: 1;"></div>
                    <div class="field" style="min-width: 240px; margin-top: 0;">
                        <label for="event-filter" style="margin-bottom: 4px;">View Event</label>
                        <select id="event-filter" class="select-wide"></select>
                    </div>
                </div>
            </div>

            <div class="card mt-20">
                <table class="table" id="matches-table">
                    <thead>
                        <tr>
                            <th>Match</th>
                            <th>Time</th>
                            <th>Red</th>
                            <th>Blue</th>
                            <th class="admin-only hidden">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Manual Match Create / Edit -->
    <div class="modal-backdrop" id="match-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title" id="match-modal-title">Add Match Manually</h2>
                <button class="modal-close" id="match-modal-close" type="button">&times;</button>
            </div>
            <form id="match-form" class="form-grid">
                <div class="field">
                    <label for="match-event-key">Event</label>
                    <select id="match-event-key" required></select>
                </div>
                <div class="field">
                    <label for="match-comp-level">Comp Level</label>
                    <select id="match-comp-level" required>
                        <option value="practice">Practice (practice)</option>
                        <option value="qm">Qualification (qm)</option>
                        <option value="qf">Quarterfinals (qf)</option>
                        <option value="sf">Semifinals (sf)</option>
                        <option value="f">Finals (f)</option>
                    </select>
                </div>
                <div class="form-grid form-grid-wide">
                    <div class="field">
                        <label for="match-number">Match Number</label>
                        <input type="number" id="match-number" required placeholder="e.g. 1" />
                    </div>
                    <div class="field">
                        <label for="match-scheduled-time">Scheduled Time</label>
                        <input type="datetime-local" id="match-scheduled-time" />
                    </div>
                </div>
                <div class="field">
                    <label>Red Alliance Teams</label>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                        <input type="number" id="match-red-team-1" required placeholder="Red 1" min="1" />
                        <input type="number" id="match-red-team-2" required placeholder="Red 2" min="1" />
                        <input type="number" id="match-red-team-3" required placeholder="Red 3" min="1" />
                    </div>
                </div>
                <div class="field">
                    <label>Blue Alliance Teams</label>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                        <input type="number" id="match-blue-team-1" required placeholder="Blue 1" min="1" />
                        <input type="number" id="match-blue-team-2" required placeholder="Blue 2" min="1" />
                        <input type="number" id="match-blue-team-3" required placeholder="Blue 3" min="1" />
                    </div>
                </div>
                <input type="hidden" id="match-key" />
                <div class="modal-footer">
                    <button class="btn ghost" id="match-modal-cancel" type="button">Cancel</button>
                    <button class="btn" type="submit">Save Match</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/matches.js"></script>
</body>
</html>
