# =========================================================================
# ObsidianScout Nginx Reverse Proxy Configuration
# =========================================================================
#
# Nginx is a high-performance reverse proxy. Because it does not handle
# WebSocket upgrades by default, this configuration explicitly includes
# Upgrade/Connection header overrides to ensure team chat works properly.
#
# To use this configuration:
# 1. Install Nginx.
# 2. Place this server block inside your nginx.conf (or /etc/nginx/sites-available/).
# 3. Replace 'yourdomain.com' and the SSL certificate paths.
# 4. Restart Nginx.
#

# HTTP Server Block (Redirects HTTP traffic to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTPS Server Block (SSL Termination & Proxying)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL Certificate Paths - Replace with your actual paths (e.g. Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL Protocols & Ciphers Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Increase maximum allowed body size for uploading scouting photos/configs
    client_max_body_size 50M;

    location / {
        # Forward requests to the internal Ktor HTTP server
        proxy_pass http://127.0.0.1:8080;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (CRITICAL: Required for team chat and live sync)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts to handle long-lived WebSocket connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
