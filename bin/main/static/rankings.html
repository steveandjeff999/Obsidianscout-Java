<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Rankings</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="manifest" href="/manifest.json" />
</head>
<body data-page="rankings">
    <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-2"></div>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">ObsidianScout</div>
            <nav class="sidebar-nav">
                <!-- Injected by base.html / Ktor -->
            </nav>
            <div class="sidebar-footer">
                <span id="nav-user" class="badge"></span>
                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>
                <button class="btn ghost" data-action="logout" type="button">Sign out</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="card">
                <h1 data-i18n="rankings.title">Team Rankings</h1>
                <p class="notice" data-i18n="rankings.notice">Rank teams based on selected metrics.</p>
                
                <div class="row gap-12 wrap align-center" style="width: 100%; margin-bottom: 20px;">
                    <div class="field" style="min-width: 240px; margin-top: 0;">
                        <label for="metric-select" style="margin-bottom: 4px;" data-i18n="rankings.metric">Ranking Metric</label>
                        <select id="metric-select" class="select-wide">
                            <option value="scouted" data-i18n="rankings.metric.scouted" selected>Scouted Average Points</option>
                            <option value="epa" data-i18n="rankings.metric.epa">Statbotics EPA</option>
                            <option value="opr" data-i18n="rankings.metric.opr">TBA OPR</option>
                            <option value="all" data-i18n="rankings.metric.all">All Three</option>
                        </select>
                    </div>
                    <div style="flex-grow: 1;"></div>
                    <div class="field" style="min-width: 240px; margin-top: 0;">
                        <label for="event-filter" style="margin-bottom: 4px;" data-i18n="matches.view_event">View Event</label>
                        <select id="event-filter" class="select-wide"></select>
                    </div>
                </div>

                <div class="table-scroll">
                    <table class="table" id="rankings-table">
                        <thead>
                            <tr>
                                <th data-i18n="rankings.rank">Rank</th>
                                <th data-i18n="rankings.team">Team</th>
                                <th data-i18n="rankings.name">Name</th>
                                <th id="header-scouted" style="cursor: pointer;">Scouted Average</th>
                                <th id="header-opr" style="cursor: pointer;">OPR</th>
                                <th id="header-epa" style="cursor: pointer;">EPA</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/rankings.js"></script>
</body>
</html>
