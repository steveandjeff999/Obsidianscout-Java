<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Pit Scout</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="pit-scout">
        <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-3"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">ObsidianScout</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link" data-page="dashboard" href="/dashboard">Dashboard</a>
                <a class="sidebar-link" data-page="scout" href="/scout">Scout</a>
                <a class="sidebar-link" data-page="pit-scout" href="/pit-scout">Pit Scout</a>
                <a class="sidebar-link" data-page="qual-scout" href="/qual-scout">Qual Scout</a>
                <a class="sidebar-link" data-page="qual-data" href="/qual-data">Qual Data</a>
                <a class="sidebar-link" data-page="pit-data" href="/pit-data">Pit Data</a>
                <a class="sidebar-link" data-page="analytics" href="/analytics">Analytics</a>
                <a class="sidebar-link" data-page="graphs" href="/graphs">Graphs</a>
                <a class="sidebar-link" data-page="events" href="/events">Events</a>
                <a class="sidebar-link" data-page="teams" href="/teams">Teams</a>
                <a class="sidebar-link" data-page="matches" href="/matches">Matches</a>
                <a class="sidebar-link" data-page="predictor" href="/predictor">Predictor</a>
                <a class="sidebar-link" data-page="users" href="/users">Users</a>
                <a class="sidebar-link" data-page="settings" href="/config">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <span id="nav-user" class="badge"></span>
                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>
                <button class="btn ghost" data-action="logout" type="button">Sign out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="card">
                <h1 data-i18n="pit_scout.title">Pit scouting form</h1>
                <p class="notice" data-i18n="pit_scout.notice">Pick event and team, then fill in the form driven by pit scouting config JSON.</p>
                <div class="split mb-18">
                    <div class="field">
                        <label>Event</label>
                        <div id="event-badge" class="badge"></div>
                    </div>
                    <div class="field">
                        <label for="team-select">Team</label>
                        <select id="team-select"></select>
                    </div>
                    <div class="field">
                        <label>Timezone</label>
                        <div id="timezone-badge" class="badge"></div>
                    </div>
                </div>
                <form id="pit-scouting-form" class="form-grid">
                    <div id="form-blocked" class="notice" data-i18n="pit_scout.form_blocked">Select a team to start pit scouting.</div>
                    <div id="form-fields" class="form-grid"></div>
                    <div class="row gap-12 wrap">
                        <button id="pit-submit" class="btn" type="submit" data-i18n="pit_scout.save_entry">Save pit entry</button>
                        <button id="pit-save-offline" class="btn secondary" type="button" data-i18n="pit_scout.save_offline">Save Offline</button>
                        <button id="pit-export-json" class="btn secondary" type="button">Export JSON</button>
                        <button id="pit-gen-qr" class="btn secondary" type="button">Generate QR</button>
                        <button id="pit-clear" class="btn ghost" type="button" data-i18n="pit_scout.clear_form">Clear form</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/vendor/qrcode.min.js"></script>
    <script src="/js/pit-scout.js"></script>
</body>
</html>
