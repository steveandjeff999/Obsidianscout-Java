<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Pit Prescout</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="manifest" href="/manifest.json" />
</head>
<body data-page="prescout-pit">
    <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <!-- Will be replaced dynamically by base.html -->
        </aside>

        <main class="main-content">
            <div class="card">
                <h1 data-i18n="prescout-pit.pit_prescouting">Pit Prescouting</h1>
                <p class="notice" data-i18n="prescout-pit.enter_an_event_code_load_the_t">Enter an event code, load the teams, then fill in the form driven by config JSON.</p>

                <div class="split mb-18">
                    <div class="field">
                        <label for="event-code-input" data-i18n="prescout-pit.event_code">Event Code</label>
                        <div class="row gap-8">
                            <input id="event-code-input" type="text" data-i18n-placeholder="prescout-pit.placeholder_eg_2024micmp" placeholder="e.g. 2024micmp" style="min-width: 140px;" />
                            <button id="load-event-btn" class="btn" type="button" data-i18n="prescout-pit.load">Load</button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="team-select" data-i18n="all-data.team">Team</label>
                        <select id="team-select" disabled></select>
                    </div>
                    <div class="field">
                        <label data-i18n="dashboard.timezone">Timezone</label>
                        <div id="timezone-badge" class="badge">--</div>
                    </div>
                </div>

                <form id="pit-scouting-form" class="form-grid">
                    <div id="form-blocked" class="notice" data-i18n="prescout-pit.enter_an_event_code_and_click_">Enter an event code and click Load, then select a team to start scouting.</div>
                    <div id="form-fields" class="form-grid"></div>

                    <div class="row gap-12 wrap">
                        <button id="pit-submit" class="btn" type="submit" disabled data-i18n="scout.save_entry">Save entry</button>
                        <button id="pit-save-offline" class="btn secondary" type="button" disabled data-i18n="scout.save_offline">Save Offline</button>
                        <button id="pit-export-json" class="btn secondary" type="button" disabled data-i18n="pit-scout.export_json">Export JSON</button>
                        <button id="pit-gen-qr" class="btn secondary" type="button" disabled data-i18n="pit-scout.generate_qr">Generate QR</button>
                        <button id="pit-clear" class="btn ghost" type="button" disabled data-i18n="scout.clear_form">Clear form</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script defer src="/js/common.js"></script>
    <script defer src="/vendor/qrcode.min.js"></script>
    <script type="module" src="/vendor/jabcodeJSLib.min.js"></script>
    <script defer src="/js/prescout-pit.js"></script>
</body>
</html>
