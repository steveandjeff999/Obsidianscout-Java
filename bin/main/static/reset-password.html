<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/obsidian/obsidian-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/obsidian/obsidian-512.png" />
    <link rel="apple-touch-icon" href="/assets/images/obsidian/obsidian-192.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Reset Password</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="reset-password">
    <script>
        (function() {
            try {
                const saved = localStorage.getItem("obsidian-theme") || "light";
                if (saved === "dark") {
                    document.body.classList.add("theme-dark");
                }
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
        })();
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="shell login-shell">
        <section class="hero login-hero">
            <div>
                <div class="brand">ObsidianScout</div>
                <h1>Choose a new password</h1>
                <p>Enter your new password below to reset your credentials and access your dashboard.</p>
            </div>
            <div class="card auth-card" style="padding: 24px;">
                <div id="loading-token" class="text-center">
                    <p class="notice">Verifying your reset token...</p>
                </div>
                
                <div id="invalid-token-panel" class="hidden" hidden>
                    <h2 class="error-text">Link Expired or Invalid</h2>
                    <p class="notice mt-12">This password reset link is invalid or has expired. Please request a new one.</p>
                    <a href="/index" class="btn mt-18 text-center" style="display:block; text-decoration:none;">Back to login</a>
                </div>

                <div id="reset-form-panel" class="hidden" hidden>
                    <h2 id="reset-welcome" class="mb-12" style="font-size:18px;">Reset Credentials</h2>
                    <form id="reset-password-form" class="form-grid mt-12" method="POST">
                        <div id="account-select-field" class="field hidden" hidden>
                            <label for="reset-account-select">Select Account to Reset</label>
                            <select id="reset-account-select">
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="field">
                            <label for="reset-username">Username</label>
                            <input id="reset-username" type="text" required />
                        </div>
                        <div class="field">
                            <label for="new-password">New Password</label>
                            <input id="new-password" type="password" required minlength="4" />
                        </div>
                        <div class="field">
                            <label for="confirm-password">Confirm Password</label>
                            <input id="confirm-password" type="password" required minlength="4" />
                        </div>
                        <button id="reset-submit" class="btn" type="submit">Reset credentials</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script defer src="/js/common.js"></script>
    <script defer src="/js/reset-password.js"></script>
</body>
</html>
