<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ObsidianScout | Events</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="events">
    <div class="orb orb-1"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">ObsidianScout</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link" data-page="dashboard" href="/dashboard.html">Dashboard</a>
                <a class="sidebar-link" data-page="scout" href="/scout.html">Scout</a>
                <a class="sidebar-link" data-page="analytics" href="/analytics.html">Analytics</a>
                <a class="sidebar-link" data-page="graphs" href="/graphs.html">Graphs</a>
                <a class="sidebar-link" data-page="events" href="/events.html">Events</a>
                <a class="sidebar-link" data-page="teams" href="/teams.html">Teams</a>
                <a class="sidebar-link" data-page="matches" href="/matches.html">Matches</a>
                <a class="sidebar-link" data-page="users" href="/users.html">Users</a>
                <a class="sidebar-link" data-page="settings" href="/config.html">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <span id="nav-user" class="badge"></span>
                <button class="btn ghost" data-action="toggle-theme" type="button">Toggle theme</button>
                <button class="btn ghost" data-action="logout" type="button">Sign out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="card">
                <h1>Events</h1>
                <p class="notice">Sync events for the selected season and pick an event for scouting.</p>
                <div class="row gap-12 wrap">
                    <button class="btn" id="sync-events" type="button">Sync events</button>
                    <button class="btn secondary hidden" id="add-event-btn" type="button">Add Event Manually</button>
                </div>
            </div>

            <div class="card mt-20">
                <table class="table" id="events-table">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Key</th>
                            <th>Dates</th>
                            <th>Timezone</th>
                            <th class="admin-only hidden">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Manual Event Create / Edit -->
    <div class="modal-backdrop" id="event-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title" id="event-modal-title">Create Custom Event</h2>
                <button class="modal-close" id="event-modal-close" type="button">&times;</button>
            </div>
            <form id="event-form" class="form-grid">
                <div class="field">
                    <label for="event-key">Event Key</label>
                    <input type="text" id="event-key" required placeholder="e.g. 2026custom" />
                    <small style="color: var(--muted); margin-top: 4px;">Enter a unique lowercase identifier.</small>
                </div>
                <div class="field">
                    <label for="event-name">Event Name</label>
                    <input type="text" id="event-name" required placeholder="e.g. Offseason Showdown" />
                </div>
                <div class="field">
                    <label for="event-year">Year</label>
                    <input type="number" id="event-year" required placeholder="2026" value="2026" />
                </div>
                <div class="form-grid form-grid-wide">
                    <div class="field">
                        <label for="event-start-date">Start Date</label>
                        <input type="date" id="event-start-date" />
                    </div>
                    <div class="field">
                        <label for="event-end-date">End Date</label>
                        <input type="date" id="event-end-date" />
                    </div>
                </div>
                <div class="field">
                    <label for="event-timezone">Timezone</label>
                    <select id="event-timezone">
                        <option value="America/New_York">America/New_York (Eastern)</option>
                        <option value="America/Chicago" selected>America/Chicago (Central)</option>
                        <option value="America/Denver">America/Denver (Mountain)</option>
                        <option value="America/Los_Angeles">America/Los_Angeles (Pacific)</option>
                        <option value="America/Phoenix">America/Phoenix (Arizona)</option>
                        <option value="America/Anchorage">America/Anchorage (Alaska)</option>
                        <option value="Pacific/Honolulu">Pacific/Honolulu (Hawaii)</option>
                        <option value="UTC">UTC</option>
                        <option value="Europe/London">Europe/London</option>
                        <option value="Europe/Paris">Europe/Paris</option>
                        <option value="Asia/Tokyo">Asia/Tokyo</option>
                        <option value="Australia/Sydney">Australia/Sydney</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn ghost" id="event-modal-cancel" type="button">Cancel</button>
                    <button class="btn" type="submit">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/events.js"></script>
</body>
</html>
